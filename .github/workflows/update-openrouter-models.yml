on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-openrouter-models
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::error::OPENROUTER_API_KEY secret is required"
            exit 1
          fi

          curl --fail --silent --show-error --location \
            --header "Authorization: Bearer $OPENROUTER_API_KEY" \
            --header "Accept: application/json" \
            --output crates/openrouter-models/data/models.json.tmp \
            https://openrouter.ai/api/v1/models

          mv crates/openrouter-models/data/models.json.tmp crates/openrouter-models/data/models.json
          cargo test -p openrouter-models raw_openrouter_models_snapshot_is_valid
          pnpm format:fix

      - uses: peter-evans/create-pull-request@v7
        with:
          commit-message: Update OpenRouter models
          title: Update OpenRouter models
          body: Updates crates/openrouter-models/data/models.json from OpenRouter and applies repository formatting.
          branch: update-openrouter-models
          base: main
          add-paths: |
            crates/openrouter-models/data/models.json
